<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <title>ProductMind | Discover</title>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="common.js"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-primary-fixed": "#000000",
            "surface-container-highest": "#192540",
            "secondary-fixed-dim": "#ceb9ff",
            "on-error": "#490013",
            "surface-container-low": "#091328",
            "primary-dim": "#6063ee",
            "on-tertiary-fixed-variant": "#00377b",
            "surface-container-high": "#141f38",
            "on-primary-container": "#0a0081",
            "tertiary-container": "#4388fd",
            "outline": "#6d758c",
            "surface-container": "#0f1930",
            "on-tertiary-container": "#000311",
            "on-surface-variant": "#a3aac4",
            "tertiary-dim": "#699cff",
            "on-surface": "#dee5ff",
            "on-secondary-fixed-variant": "#5f28c8",
            "on-primary-fixed-variant": "#0e009d",
            "inverse-surface": "#faf8ff",
            "secondary": "#ac8aff",
            "primary-fixed-dim": "#8387ff",
            "surface-dim": "#060e20",
            "surface-container-lowest": "#000000",
            "surface-tint": "#a3a6ff",
            "secondary-fixed": "#dac9ff",
            "surface": "#060e20",
            "primary-container": "#9396ff",
            "on-secondary-fixed": "#40009b",
            "on-secondary-container": "#d9c8ff",
            "surface-variant": "#192540",
            "error": "#ff6e84",
            "tertiary-fixed-dim": "#73a2ff",
            "on-tertiary": "#001e4a",
            "primary": "#a3a6ff",
            "error-dim": "#d73357",
            "surface-bright": "#1f2b49",
            "outline-variant": "#40485d",
            "on-error-container": "#ffb2b9",
            "on-primary": "#0f00a4",
            "on-background": "#dee5ff",
            "secondary-dim": "#8455ef",
            "tertiary-fixed": "#8ab0ff",
            "on-secondary": "#280067",
            "error-container": "#a70138",
            "secondary-container": "#5516be",
            "primary-fixed": "#9396ff",
            "background": "#060e20",
            "inverse-on-surface": "#4d556b",
            "on-tertiary-fixed": "#00163b",
            "tertiary": "#699cff",
            "inverse-primary": "#494bd7"
          },
          "borderRadius": {
            "DEFAULT": "1rem",
            "lg": "2rem",
            "xl": "3rem",
            "full": "9999px"
          },
          "fontFamily": {
            "headline": ["Manrope"],
            "body": ["Inter"],
            "label": ["Inter"]
          }
        },
      },
    }
  </script>
  <style>
    body {
      background-color: #060e20;
      color: #dee5ff;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .glass-panel {
      backdrop-filter: blur(24px);
    }

    .bg-gradient-primary {
      background: linear-gradient(135deg, #a3a6ff 0%, #ac8aff 100%);
    }

    .glow-primary {
      box-shadow: 0 0 48px rgba(96, 99, 238, 0.15);
    }

    .nav-blur {
      backdrop-filter: blur(20px);
    }

    /* Chat UI Styles */
    .chat-bubble-user {
      background: linear-gradient(135deg, #a3a6ff 0%, #ac8aff 100%);
      color: #0f00a4;
      border-radius: 1.5rem 1.5rem 0.25rem 1.5rem;
      padding: 1rem 1.5rem;
      max-width: 80%;
      align-self: flex-end;
      box-shadow: 0 4px 15px rgba(163, 166, 255, 0.2);
    }

    .chat-bubble-ai {
      background: #192540;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(163, 166, 255, 0.1);
      color: #dee5ff;
      border-radius: 1.5rem 1.5rem 1.5rem 0.25rem;
      padding: 1rem 1.5rem;
      max-width: 80%;
      align-self: flex-start;
    }

    #pm-chat-container {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    #pm-chat-container::-webkit-scrollbar {
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
</head>

<body class="font-body selection:bg-primary selection:text-on-primary">
  <div id="topnav-mount"></div>
  <main class="pt-32 pb-24 px-6 md:px-12 max-w-7xl mx-auto space-y-12">
    <!-- Hero Header -->
    <header class="relative text-center space-y-4">
      <div class="absolute -top-24 left-1/2 -translate-x-1/2 w-[600px] h-[400px] bg-primary/10 blur-[120px] rounded-full -z-10"></div>
      <h1 class="font-headline font-extrabold text-4xl md:text-6xl tracking-tighter leading-tight">
        Product<span class="bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">Mind</span>
      </h1>
      <p class="text-on-surface-variant text-lg max-w-xl mx-auto font-light">
        Your conversational shopping intelligence.
      </p>
    </header>

    <!-- Chat View -->
    <div class="max-w-4xl mx-auto space-y-8">
      <div id="pm-chat-container" class="flex flex-col gap-6 min-h-[100px]">
        <!-- Welcome Message -->
        <div class="chat-bubble-ai animate-fadeIn">
          Hello! I'm here to help you find precisely what you need. What are you looking for today?
        </div>
      </div>

      <!-- Input Section -->
      <div class="relative group">
        <div class="bg-surface-container-highest rounded-xl p-2 flex items-center shadow-2xl focus-within:ring-1 ring-secondary/40 transition-all duration-300">
          <input id="pm-search-input"
            class="flex-1 bg-transparent border-none focus:ring-0 px-6 py-4 text-on-surface placeholder:text-on-surface-variant/50 text-lg"
            placeholder="Type a message..." type="text" />
          <button id="pm-ask-btn"
            class="bg-gradient-primary text-on-primary-fixed px-8 py-4 rounded-full font-bold flex items-center gap-2 hover:opacity-90 active:scale-95 transition-all glow-primary">
            <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">send</span>
            <span>Send</span>
          </button>
        </div>
        <div class="absolute inset-0 bg-secondary/5 blur-xl -z-10 rounded-xl opacity-0 group-focus-within:opacity-100 transition-opacity"></div>
      </div>

      <!-- Quick Actions -->
      <div class="flex flex-wrap justify-center gap-3">
        <button class="pm-pill px-5 py-2 rounded-full bg-secondary-container text-on-secondary-container text-xs font-medium hover:bg-secondary-container/80 transition-colors">Noise-cancelling headphones</button>
        <button class="pm-pill px-5 py-2 rounded-full bg-secondary-container text-on-secondary-container text-xs font-medium hover:bg-secondary-container/80 transition-colors">Ergonomic office chairs</button>
        <button class="pm-pill px-5 py-2 rounded-full bg-secondary-container text-on-secondary-container text-xs font-medium hover:bg-secondary-container/80 transition-colors">Mechanical keyboards</button>
      </div>
    </div>

    <!-- Results Display (Dynamic) -->
    <div id="pm-results-container"></div>
  </main>

  <div id="bottomnav-mount"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      renderTopNav('discover');
      renderBottomNav('discover');

      const input = document.getElementById('pm-search-input');
      const askBtn = document.getElementById('pm-ask-btn');
      const chatContainer = document.getElementById('pm-chat-container');
      const resultsContainer = document.getElementById('pm-results-container');

      let chatHistory = getHistory().map(h => ({ role: h.role || 'user', content: h.query || h.content }));

      // Restore last state
      const lastQuery = getLastQuery();
      const lastResults = getLastResults();
      if (lastQuery && lastResults) {
        addMessage('user', lastQuery, false);
        renderResults(lastResults);
      }

      function addMessage(role, content, animate = true) {
        const div = document.createElement('div');
        div.className = `chat-bubble-${role === 'user' ? 'user' : 'ai'} ${animate ? 'animate-fadeIn' : ''}`;
        div.innerHTML = content;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }

      function googleLinkForProduct(product) {
        if (product.google_link) return product.google_link;
        const q = `${product.name} ${product.brand || ''} ${product.category || ''}`.trim();
        return `https://www.google.com/search?q=${encodeURIComponent(q + ' buy online')}`;
      }

      function encodeProduct(product) {
        return encodeURIComponent(JSON.stringify(product));
      }

      function decodeProduct(serialized) {
        try { return JSON.parse(decodeURIComponent(serialized)); } catch { return null; }
      }

      async function handleChat() {
        const msg = input.value.trim();
        if (!msg) return;

        input.value = '';
        addMessage('user', msg);
        saveQuery(msg);

        askBtn.disabled = true;
        askBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">autorenew</span>';

        try {
          // Use the new /chat endpoint
          const token = localStorage.getItem('pm_auth_token');
          const res = await fetch('http://localhost:8000/chat', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
              message: msg,
              history: chatHistory.slice(-10)
            })
          });

          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || 'Chat failed');

          chatHistory.push({ role: 'user', content: msg });
          chatHistory.push({ role: 'assistant', content: data.answer || data.explanation.substring(0, 100) + '...' });
          
          saveResults(data);
          addToHistory(msg, data.top_pick?.name, data.top_pick?.category);
          
          // Sync with Compare page
          const allProds = [data.top_pick, ...(data.alternatives || [])].filter(p => p && p.id !== 'no-match');
          localStorage.setItem("comparisonProducts", JSON.stringify(allProds));
          localStorage.setItem("comparisonMeta", JSON.stringify(data.comparison_data || {}));
          
          if (data.answer) {
            addMessage('ai', data.answer);
          }
          
          renderResults(data);
        } catch (err) {
          addMessage('ai', `<span class="text-error">Error: ${err.message}</span>`);
        } finally {
          askBtn.disabled = false;
          askBtn.innerHTML = '<span class="material-symbols-outlined" style="font-variation-settings: \'FILL\' 1;">send</span><span>Send</span>';
        }
      }

      askBtn.addEventListener('click', handleChat);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') handleChat(); });

      document.querySelectorAll('.pm-pill').forEach(pill => {
        pill.addEventListener('click', () => {
          input.value = pill.textContent.trim();
          handleChat();
        });
      });

      window.toggleSave = function toggleSave(product) {
        if (!product) return;
        const btn = document.getElementById(`save-btn-${product.id}`);
        const icon = btn ? btn.querySelector('.material-symbols-outlined') : null;
        if (isProductSaved(product.id)) {
          removeSavedProduct(product.id);
          if (icon) icon.style = "";
        } else {
          saveProduct(product);
          if (icon) icon.style = "font-variation-settings:'FILL' 1;";
        }
      };

      function renderResults(data) {
        resultsContainer.innerHTML = '';
        const top = data.top_pick || {};
        const alts = data.alternatives || [];
        const followups = data.followups || [];

        const section = document.createElement('section');
        section.className = 'space-y-10 animate-fadeIn';
        
        const prefChips = (data.extracted_preferences?.keywords || []).slice(0, 3).map(k => `
          <span class="px-3 py-1 rounded-full bg-surface-container-highest border border-outline-variant/20 text-xs text-on-surface-variant">🔍 ${k}</span>
        `).join('');

        section.innerHTML = `
          <div class="flex items-center gap-2 mb-4">${prefChips}</div>
          
          <!-- Top Pick -->
          <div class="bg-surface-container-low rounded-xl overflow-hidden shadow-2xl border border-primary/10 grid grid-cols-1 md:grid-cols-2">
            <div class="h-64 md:h-auto overflow-hidden">
              <img src="${getProductImageUrl(top)}" 
                   class="w-full h-full object-cover" 
                   data-product-image='${JSON.stringify(getProductImageSources(top))}'
                   data-image-index="0">
            </div>
            <div class="p-8 flex flex-col gap-4">
              <div class="flex justify-between items-start">
                <div>
                  <h3 class="text-2xl font-headline font-bold">${top.name}</h3>
                  <p class="text-xs text-primary/70 uppercase tracking-widest">${top.brand} · ${top.category}</p>
                </div>
                <span class="text-2xl font-bold text-primary">₹${Number(top.price).toLocaleString('en-IN')}</span>
              </div>
              <p class="text-sm text-on-surface-variant leading-relaxed italic">"${data.explanation}"</p>
              
              <!-- Key Details Box -->
              <div class="bg-surface-container-highest/40 border border-outline-variant/20 rounded-xl p-5 space-y-3">
                <h4 class="text-xs font-bold uppercase tracking-widest text-primary">Key Details</h4>
                <ul class="text-xs space-y-1 text-on-surface-variant">
                  <li><span class="opacity-60">• Price:</span> ₹${Number(top.price).toLocaleString('en-IN')}</li>
                  <li><span class="opacity-60">• Brand:</span> ${top.brand}</li>
                  <li><span class="opacity-60">• Category:</span> ${top.category}</li>
                  <li><span class="opacity-60">• Features:</span> ${(top.features || []).slice(0, 3).join(', ')}</li>
                </ul>
              </div>

              ${data.insight ? `
              <div class="bg-surface-container/60 border border-secondary/20 rounded-xl p-4 space-y-2">
                <div class="flex items-center gap-2 text-secondary">
                  <span class="material-symbols-outlined text-sm">insights</span>
                  <span class="text-xs font-bold uppercase tracking-wider">Personal Insight</span>
                </div>
                <p class="text-[11px] text-on-surface leading-relaxed">${data.insight}</p>
              </div>` : ''}
              <div class="mt-auto flex gap-4">
                <a href="${googleLinkForProduct(top)}" target="_blank" class="flex-1 bg-gradient-primary text-on-primary-fixed py-3 rounded-full font-bold text-center">View Product</a>
                <button class="p-3 rounded-full border border-outline-variant/30 hover:bg-surface-container-highest" id="save-btn-${top.id}" onclick='toggleSave(${JSON.stringify(top).replace(/'/g, "&apos;")})'>
                  <span class="material-symbols-outlined" style="${isProductSaved(top.id) ? "font-variation-settings:'FILL' 1;" : ''}">bookmark</span>
                </button>
              </div>
            </div>
          </div>

          <!-- Alternatives -->
          ${alts.length ? `
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            ${alts.map(p => `
              <div class="bg-surface-container-high rounded-xl overflow-hidden shadow-lg flex flex-col">
                <div class="h-40 overflow-hidden">
                  <img src="${getProductImageUrl(p)}" 
                       class="w-full h-full object-cover"
                       data-product-image='${JSON.stringify(getProductImageSources(p))}'
                       data-image-index="0">
                </div>
                <div class="p-5 flex-1 flex flex-col gap-2">
                  <h4 class="font-bold text-sm text-on-surface">${p.name}</h4>
                  <p class="text-primary font-bold">₹${Number(p.price).toLocaleString('en-IN')}</p>
                  <p class="text-[10px] text-on-surface-variant line-clamp-2">${p.features.join(' · ')}</p>
                  <div class="mt-auto pt-3 flex gap-2">
                    <a href="${googleLinkForProduct(p)}" target="_blank" class="flex-1 py-2 bg-surface-container-highest text-center rounded-full text-xs font-bold">View</a>
                    <button class="p-2 rounded-full border border-outline-variant/30 hover:bg-surface-container-highest" id="save-btn-${p.id}" onclick='toggleSave(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                      <span class="material-symbols-outlined text-xs" style="${isProductSaved(p.id) ? "font-variation-settings:'FILL' 1;" : ''}">bookmark</span>
                    </button>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>` : ''}

          <!-- Followups -->
          <div class="flex flex-wrap gap-2 pt-4">
            ${followups.map(f => `
              <button class="px-4 py-2 rounded-full bg-secondary-container/30 text-on-secondary-container text-xs hover:bg-secondary-container/50 transition-colors" onclick="document.getElementById('pm-search-input').value='${f}'; document.getElementById('pm-ask-btn').click()">${f}</button>
            `).join('')}
          </div>
        `;
        
        resultsContainer.appendChild(section);
        wireProductImageFallbacks(section);
        resultsContainer.scrollIntoView({ behavior: 'smooth' });
      }

      const spinStyle = document.createElement('style');
      spinStyle.textContent = `@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .animate-spin { animation: spin 1s linear infinite; }`;
      document.head.appendChild(spinStyle);
    });
  </script>
</body>
</html>
